<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login · Fandian</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" />
    <link rel="stylesheet" href="{{ static_url('admin.css') }}" />
  </head>
  <body>
    <div class="login-wrap">
      <div class="login-card">
        <div class="login-brand">{% include "_logo_mark.html" %}Fandian</div>
        <h2>Welcome back</h2>
        <p class="subtitle">Sign in to your hotel dashboard</p>
        {% if error %}
          <div class="error-msg">{{ error }}</div>
        {% endif %}
        <form method="post">
          <div class="form-group">
            <label>Email</label>
            <input class="input" type="email" name="email" required placeholder="you@hotel.com" />
          </div>
          <div class="form-group">
            <label>Password</label>
            <input class="input" type="password" name="password" required placeholder="••••••••" />
          </div>
          <button class="btn" type="submit" style="width:100%; justify-content:center; margin-top:8px;">Sign in</button>
        </form>
      </div>
    </div>
  </body>
</html>
