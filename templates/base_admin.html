<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ title or "Admin" }} · Hotel Concierge</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="/static/admin.css" />
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar">
        <h1>Hotel Concierge</h1>
        <nav class="nav">
          <a href="/admin/messages" class="{% if active_page=='messages' %}active{% endif %}">Messages</a>
          <a href="/admin/tasks" class="{% if active_page=='tasks' %}active{% endif %}">Tasks</a>
          <a href="/admin/hotel" class="{% if active_page=='hotel' %}active{% endif %}">Hotel Info</a>
          <a href="/admin/knowledge" class="{% if active_page=='knowledge' %}active{% endif %}">Knowledge Base</a>
          <a href="/admin/users" class="{% if active_page=='users' %}active{% endif %}">Users</a>
        </nav>
      </aside>
      <main class="content">
        <div class="topbar">
          <div class="user">
            {{ session.get('email','') }} · {{ session.get('role','') }}
            &nbsp;·&nbsp; <a href="/logout">Logout</a>
          </div>
        </div>
        {% block content %}{% endblock %}
      </main>
    </div>
    <script src="/static/admin.js"></script>
  </body>
</html>
