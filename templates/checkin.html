{% extends "base_admin.html" %}
{% block content %}

<div class="page-header">
  <h2>{{ t['checkin_heading'] }}</h2>
  <p>{{ t['checkin_subtitle'] }}</p>
</div>

{% if error %}
<div class="alert alert-error">{{ error }}</div>
{% endif %}

<div class="panel" style="max-width: 520px;">
  <form method="post" class="checkin-form">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}" />

    <div class="field">
      <label class="field-label">{{ t['checkin_phone_label'] }}</label>
      <input class="input" type="tel" name="phone"
             placeholder="{{ t['checkin_phone_placeholder'] }}"
             autofocus autocomplete="off" />
      <div class="field-hint">{{ t['checkin_phone_hint'] }}</div>
    </div>

    <div class="field">
      <label class="field-label">{{ t['checkin_room_label'] }}</label>
      <input class="input" type="text" name="room_number" placeholder="{{ t['checkin_room_placeholder'] }}" />
    </div>

    <div class="field">
      <label class="field-label">{{ t['checkin_checkout_label'] }}</label>
      <div style="display:flex; gap:10px;">
        <input class="input" type="date" name="check_out_date_part" style="flex:1;" />
        <input class="input" type="time" name="check_out_time_part" step="300" style="width:130px;" />
      </div>
      <div class="field-hint">{{ t['checkin_checkout_hint'] }}</div>
    </div>

    <div style="padding-top: 4px;">
      <button class="btn checkin-submit" type="submit">{{ t['checkin_btn_submit'] }}</button>
    </div>

  </form>
</div>

<script>
  const timeInput = document.querySelector('input[name="check_out_time_part"]');
  if (timeInput) {
    const saved = localStorage.getItem('hostly_checkout_time');
    if (saved) timeInput.value = saved;
    timeInput.addEventListener('change', function () {
      if (this.value) localStorage.setItem('hostly_checkout_time', this.value);
    });
  }
</script>
{% endblock %}
